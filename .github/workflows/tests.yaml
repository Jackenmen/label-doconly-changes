name: Tests

on: [push, pull_request]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository.
        uses: actions/checkout@v6

      - name: Setup Python.
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install the project.
        run: pip install .[test]

      - name: Run pytest.
        run: pytest
